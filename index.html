<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Интерактивная диаграмма режима работы склада</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --panel:#ffffff;
      --line:#d7dee9;
      --line-soft:#e8edf5;
      --text:#1f2937;
      --muted:#667085;
      --pickup:#dbeafe;
      --pickup-border:#60a5fa;
      --delivery:#dcfce7;
      --delivery-border:#4ade80;
      --transfer:#fef3c7;
      --transfer-border:#f59e0b;
      --selected:#111827;
      --danger:#dc2626;
      --shadow:0 10px 30px rgba(15,23,42,.08);

      --hour-width:82px;
      --day-width:130px;
      --header-h:42px;
      --lane-h:44px;
      --lane-gap:8px;
      --event-h:14px;
      --event-top:30px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    body.dragging,
    body.dragging *{
      user-select:none !important;
      -webkit-user-select:none !important;
      cursor:grabbing !important;
    }

    .page{
      padding:12px;
      max-width:1800px;
      margin:0 auto;
    }

    .topbar{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .title{
      font-size:22px;
      font-weight:700;
      margin-right:auto;
    }

    .chip{
      background:#eef2f7;
      color:#334155;
      border:1px solid #dbe3ee;
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(780px,1fr) 320px;
      gap:12px;
    }

    .panel{
      background:var(--panel);
      border:1px solid #e5eaf1;
      border-radius:16px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .panel-head{
      padding:12px 14px;
      border-bottom:1px solid #e8edf5;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .panel-head h2{
      margin:0;
      font-size:16px;
    }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }

    button, select, input, textarea{
      font:inherit;
    }

    .btn{
      border:1px solid #d8e0ea;
      background:#fff;
      border-radius:10px;
      padding:8px 12px;
      cursor:pointer;
      color:#0f172a;
      font-size:13px;
    }

    .btn:hover{
      background:#f8fafc;
    }

    .btn.primary{
      background:#0f172a;
      color:#fff;
      border-color:#0f172a;
    }

    .btn.danger{
      background:var(--danger);
      color:#fff;
      border-color:var(--danger);
    }

    .board-wrap{
      padding:10px;
      overflow:auto;
      background:#fff;
    }

    .board{
      position:relative;
      min-width:calc(var(--day-width) + 12 * var(--hour-width));
    }

    .time-header{
      display:grid;
      grid-template-columns:var(--day-width) repeat(12, var(--hour-width));
      position:sticky;
      top:0;
      z-index:20;
      background:#fff;
    }

    .time-cell{
      height:var(--header-h);
      border-top:1px solid var(--line);
      border-bottom:1px solid var(--line);
      border-right:1px solid var(--line);
      display:flex;
      align-items:center;
      padding:0 8px;
      font-weight:700;
      color:#334155;
      background:#f8fafc;
      font-size:12px;
    }

    .time-cell:first-child{
      border-left:1px solid var(--line);
    }

    .day-row{
      display:grid;
      grid-template-columns:var(--day-width) 1fr;
      border-left:1px solid var(--line);
      border-right:1px solid var(--line);
      border-bottom:1px solid var(--line);
      background:#fff;
    }

    .day-label{
      padding:12px 10px;
      font-size:14px;
      font-weight:700;
      background:#f8fafc;
      border-right:1px solid var(--line);
      display:flex;
      align-items:flex-start;
    }

    .day-grid{
      position:relative;
      background:
        repeating-linear-gradient(
          to right,
          transparent 0,
          transparent calc(var(--hour-width)/2 - 1px),
          var(--line-soft) calc(var(--hour-width)/2 - 1px),
          var(--line-soft) calc(var(--hour-width)/2 + 1px),
          transparent calc(var(--hour-width)/2 + 1px),
          transparent var(--hour-width)
        ),
        repeating-linear-gradient(
          to right,
          var(--line) 0,
          var(--line) 1px,
          transparent 1px,
          transparent var(--hour-width)
        );
    }

    .lane{
      position:relative;
      height:calc(var(--lane-h) + var(--lane-gap));
      border-bottom:1px dashed #eef2f7;
    }

    .lane:last-child{
      border-bottom:none;
    }

    .event{
      position:absolute;
      height:var(--event-h);
      top:var(--event-top);
      border-radius:999px;
      border:2px solid transparent;
      cursor:grab;
      z-index:5;
      touch-action:none;
    }

    .event.selected{
      outline:2px solid var(--selected);
      outline-offset:1px;
      z-index:9;
    }

    .event.pickup{
      background:var(--pickup);
      border-color:var(--pickup-border);
    }

    .event.delivery{
      background:var(--delivery);
      border-color:var(--delivery-border);
    }

    .event.transfer{
      background:var(--transfer);
      border-color:var(--transfer-border);
    }

    .event-body{
      position:absolute;
      inset:0 12px 0 12px;
      border-radius:999px;
    }

    .event-arrow{
      position:absolute;
      right:-2px;
      top:50%;
      transform:translateY(-50%);
      width:0;
      height:0;
      border-top:9px solid transparent;
      border-bottom:9px solid transparent;
      border-left:14px solid currentColor;
    }

    .event.pickup .event-arrow{color:var(--pickup-border)}
    .event.delivery .event-arrow{color:var(--delivery-border)}
    .event.transfer .event-arrow{color:var(--transfer-border)}

    .handle{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:10px;
      height:20px;
      border-radius:8px;
      background:#111827;
      z-index:10;
      touch-action:none;
    }

    .handle.left{
      left:-5px;
      cursor:ew-resize;
    }

    .handle.right{
      right:-5px;
      cursor:ew-resize;
    }

    .event-label{
      position:absolute;
      top:-18px;
      left:0;
      font-size:11px;
      line-height:1;
      font-weight:700;
      color:#0f172a;
      white-space:nowrap;
      pointer-events:none;
      background:rgba(255,255,255,.94);
      padding:1px 5px;
      border-radius:6px;
      border:1px solid rgba(203,213,225,.8);
    }

    .event-time{
      position:absolute;
      top:-34px;
      left:0;
      font-size:10px;
      color:#475467;
      white-space:nowrap;
      pointer-events:none;
      background:rgba(255,255,255,.94);
      padding:1px 5px;
      border-radius:6px;
      border:1px solid rgba(203,213,225,.8);
    }

    .sidebar{
      padding:12px;
    }

    .summary-card{
      border-radius:14px;
      padding:12px;
      margin-bottom:12px;
      border:2px solid transparent;
    }

    .summary-card.pickup{
      background:var(--pickup);
      border-color:var(--pickup-border);
    }

    .summary-card.delivery{
      background:var(--delivery);
      border-color:var(--delivery-border);
    }

    .summary-card.transfer{
      background:var(--transfer);
      border-color:var(--transfer-border);
    }

    .summary-title{
      font-weight:700;
      margin-bottom:6px;
      font-size:13px;
    }

    .field{
      margin-bottom:10px;
    }

    .field label{
      display:block;
      font-size:12px;
      font-weight:700;
      color:#475467;
      margin-bottom:5px;
    }

    .field input,
    .field select,
    .field textarea{
      width:100%;
      border:1px solid #cfd8e3;
      border-radius:10px;
      padding:9px 10px;
      background:#fff;
      font-size:13px;
    }

    .field textarea{
      min-height:72px;
      resize:vertical;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    .hint{
      color:#667085;
      font-size:12px;
      line-height:1.4;
    }

    .footer-note{
      margin-top:8px;
      padding:10px;
      border:1px dashed #d8e0ea;
      background:#fafcff;
      border-radius:12px;
      font-size:12px;
      color:#475467;
    }

    @media (max-width:1200px){
      .layout{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="title">Интерактивная диаграмма режима работы склада</div>
      <div class="chip">08:00–20:00</div>
      <div class="chip">Дни недели по оси Y</div>
      <div class="chip">Перетаскивание по времени, дню и дорожке</div>
    </div>

    <div class="layout">
      <div class="panel">
        <div class="panel-head">
          <h2>Поле моделирования</h2>
          <div class="toolbar">
            <button class="btn" id="addPickup">+ Самовывоз</button>
            <button class="btn" id="addDelivery">+ Доставка</button>
            <button class="btn" id="addTransfer">+ Перемещение</button>
            <button class="btn" id="resetBtn">Сброс</button>
            <button class="btn primary" id="exportBtn">Экспорт JSON</button>
          </div>
        </div>
        <div class="board-wrap">
          <div class="board" id="board"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>Свойства события</h2>
        </div>
        <div class="sidebar" id="sidebar"></div>
      </div>
    </div>
  </div>

  <script>
    const DAYS = ["Понедельник","Вторник","Среда","Четверг","Пятница"];
    const START_HOUR = 8;
    const END_HOUR = 20;
    const HOUR_WIDTH = 82;
    const DAY_WIDTH = 130;
    const HEADER_H = 42;
    const LANE_STEP = 52;
    const SNAP_MINUTES = 15;
    const MIN_DURATION = 30;

    const TYPE_META = {
      pickup: { label: "Самовывоз", icon: "🚚" },
      delivery: { label: "Доставка", icon: "📦" },
      transfer: { label: "Перемещение", icon: "🔁" }
    };

    const INITIAL_EVENTS = [
      {
        id: 1,
        type: "pickup",
        day: 0,
        lane: 0,
        start: 8 * 60,
        end: 12 * 60,
        title: "Самовывоз: приём заявок",
        note: "Заявки на отгрузку, созданные в 1С до 12:00 текущего дня, собираем и отгружаем в этот же день. Заезд на территорию до 19:00, отгрузка до 20:00."
      },
      {
        id: 2,
        type: "pickup",
        day: 0,
        lane: 1,
        start: 12 * 60,
        end: 20 * 60,
        title: "Самовывоз: отгрузка следующего рабочего дня",
        note: "Заявки на самовывоз, созданные после 12:00 текущего дня, отгружаются на следующий рабочий день в интервале 09:00–20:00. Заезд на территорию до 19:00."
      },
      {
        id: 3,
        type: "delivery",
        day: 0,
        lane: 2,
        start: 8 * 60,
        end: 18 * 60,
        title: "Доставка: приём заявок",
        note: "Заявки на отгрузку, созданные в 1С до 18:00 текущего дня, отгружаются и доставляются через один рабочий день. Выходные не считаем."
      },
      {
        id: 4,
        type: "transfer",
        day: 0,
        lane: 3,
        start: 8 * 60,
        end: 17 * 60,
        title: "Ступино → СПБ: приём заявок",
        note: "Заявки, созданные в 1С до 17:00 понедельника."
      },
      {
        id: 5,
        type: "transfer",
        day: 1,
        lane: 0,
        start: 14 * 60,
        end: 20 * 60,
        title: "Ступино → СПБ: отгрузка",
        note: "Отгрузка во вторник с 14:00. Перемещение один раз в неделю. XL-формат допустим."
      },
      {
        id: 6,
        type: "transfer",
        day: 0,
        lane: 4,
        start: 8 * 60,
        end: 18 * 60,
        title: "Ступино → Шереметьево: приём заявок",
        note: "Заявки, созданные в 1С до 18:00 понедельника."
      },
      {
        id: 7,
        type: "transfer",
        day: 2,
        lane: 0,
        start: 9 * 60,
        end: 16 * 60,
        title: "Ступино → Шереметьево: отгрузка",
        note: "Отгрузка в среду. Перемещение один раз в неделю. XL-формат допустим."
      },
      {
        id: 8,
        type: "transfer",
        day: 0,
        lane: 5,
        start: 8 * 60,
        end: 18 * 60,
        title: "Ступино → Подольск: приём заявок 1",
        note: "Заявки, созданные в 1С до 18:00 понедельника."
      },
      {
        id: 9,
        type: "transfer",
        day: 2,
        lane: 1,
        start: 9 * 60,
        end: 16 * 60,
        title: "Ступино → Подольск: отгрузка 1",
        note: "Заявки, созданные в 1С до 18:00 понедельника, отгружаются в среду. XL-формат допустим."
      },
      {
        id: 10,
        type: "transfer",
        day: 2,
        lane: 2,
        start: 8 * 60,
        end: 18 * 60,
        title: "Ступино → Подольск: приём заявок 2",
        note: "Заявки, созданные в 1С до 18:00 среды, включая заявки вторника."
      },
      {
        id: 11,
        type: "transfer",
        day: 4,
        lane: 0,
        start: 9 * 60,
        end: 16 * 60,
        title: "Ступино → Подольск: отгрузка 2",
        note: "Заявки, созданные в 1С до 18:00 среды, отгружаются в пятницу, включая заявки вторника. XL-формат допустим."
      },
      {
        id: 12,
        type: "transfer",
        day: 3,
        lane: 0,
        start: 8 * 60,
        end: 18 * 60,
        title: "Ступино → Подольск: приём заявок 3",
        note: "Заявки, созданные в 1С до 18:00 четверга."
      },
      {
        id: 13,
        type: "transfer",
        day: 0,
        lane: 6,
        start: 8 * 60,
        end: 20 * 60,
        title: "Ступино → Подольск: отгрузка 3",
        note: "Заявки, созданные в 1С до 18:00 четверга, отгружаются в понедельник. XL-формат допустим."
      }
    ];

    let events = structuredClone(INITIAL_EVENTS);
    let selectedId = events[0]?.id ?? null;
    let dragState = null;

    const board = document.getElementById("board");
    const sidebar = document.getElementById("sidebar");

    document.getElementById("addPickup").addEventListener("click", () => createEvent("pickup"));
    document.getElementById("addDelivery").addEventListener("click", () => createEvent("delivery"));
    document.getElementById("addTransfer").addEventListener("click", () => createEvent("transfer"));
    document.getElementById("resetBtn").addEventListener("click", () => {
      events = structuredClone(INITIAL_EVENTS);
      selectedId = events[0]?.id ?? null;
      render();
    });
    document.getElementById("exportBtn").addEventListener("click", exportJSON);

    function snapMinutes(v){
      return Math.round(v / SNAP_MINUTES) * SNAP_MINUTES;
    }

    function clamp(v, min, max){
      return Math.max(min, Math.min(max, v));
    }

    function formatTime(minutes){
      const h = Math.floor(minutes / 60);
      const m = minutes % 60;
      return String(h).padStart(2,"0") + ":" + String(m).padStart(2,"0");
    }

    function parseTimeInput(value){
      const [h,m] = value.split(":").map(Number);
      return h * 60 + m;
    }

    function minutesToX(minutes){
      return ((minutes - START_HOUR * 60) / 60) * HOUR_WIDTH;
    }

    function xToMinutes(px){
      return START_HOUR * 60 + (px / HOUR_WIDTH) * 60;
    }

    function escapeHtml(text){
      return String(text)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;");
    }

    function getEventById(id){
      return events.find(e => e.id === id);
    }

    function getDayEvents(day){
      return events.filter(e => e.day === day);
    }

    function getLaneCount(day){
      const dayEvents = getDayEvents(day);
      const maxLane = dayEvents.length ? Math.max(...dayEvents.map(e => e.lane)) : 0;
      return Math.max(maxLane + 1, 2);
    }

    function selectEvent(id){
      selectedId = id;
      render();
    }

    function exportJSON(){
      const blob = new Blob([JSON.stringify(events, null, 2)], { type:"application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "warehouse-gantt-data.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    function createEvent(type){
      const nextId = events.length ? Math.max(...events.map(e => e.id)) + 1 : 1;
      events.push({
        id: nextId,
        type,
        day: 0,
        lane: 0,
        start: 9 * 60,
        end: 11 * 60,
        title: TYPE_META[type].label + ": новое событие",
        note: type === "transfer"
          ? "XL-формат допустим, при необходимости уточни подпись."
          : "Измени подпись и время."
      });
      selectedId = nextId;
      render();
    }

    function normalizeLanes(){
      for(let day = 0; day < DAYS.length; day++){
        const dayEvents = events
          .filter(e => e.day === day)
          .sort((a,b) => a.start - b.start || a.end - b.end);

        const laneEnds = [];
        for(const ev of dayEvents){
          let lane = 0;
          while(laneEnds[lane] !== undefined && ev.start < laneEnds[lane]){
            lane++;
          }
          ev.lane = lane;
          laneEnds[lane] = ev.end;
        }
      }
    }

    function getDayTop(dayIndex){
      let top = HEADER_H;
      for(let d = 0; d < dayIndex; d++){
        top += getLaneCount(d) * LANE_STEP;
      }
      return top;
    }

    function getDayFromBoardY(y){
      let cursor = HEADER_H;
      for(let d = 0; d < DAYS.length; d++){
        const h = getLaneCount(d) * LANE_STEP;
        if(y >= cursor && y < cursor + h) return d;
        cursor += h;
      }
      return DAYS.length - 1;
    }

    function getLaneFromBoardY(y, day){
      const top = getDayTop(day);
      return Math.max(0, Math.floor((y - top) / LANE_STEP));
    }

    function render(){
      renderBoard();
      renderSidebar();
    }

    function renderBoard(){
      board.innerHTML = "";

      const header = document.createElement("div");
      header.className = "time-header";

      const emptyCell = document.createElement("div");
      emptyCell.className = "time-cell";
      header.appendChild(emptyCell);

      for(let h = START_HOUR; h < END_HOUR; h++){
        const cell = document.createElement("div");
        cell.className = "time-cell";
        cell.textContent = String(h).padStart(2,"0") + ":00";
        header.appendChild(cell);
      }

      board.appendChild(header);

      for(let day = 0; day < DAYS.length; day++){
        const row = document.createElement("div");
        row.className = "day-row";

        const label = document.createElement("div");
        label.className = "day-label";
        label.textContent = DAYS[day];
        row.appendChild(label);

        const grid = document.createElement("div");
        grid.className = "day-grid";
        grid.dataset.day = day;
        grid.style.height = (getLaneCount(day) * LANE_STEP) + "px";

        for(let lane = 0; lane < getLaneCount(day); lane++){
          const laneEl = document.createElement("div");
          laneEl.className = "lane";
          laneEl.dataset.day = day;
          laneEl.dataset.lane = lane;
          grid.appendChild(laneEl);
        }

        const dayEvents = getDayEvents(day);
        for(const ev of dayEvents){
          const el = document.createElement("div");
          el.className = "event " + ev.type + (ev.id === selectedId ? " selected" : "");
          el.dataset.id = ev.id;

          const left = minutesToX(ev.start);
          const width = Math.max(40, minutesToX(ev.end) - minutesToX(ev.start));
          const top = ev.lane * LANE_STEP + 30;

          el.style.left = left + "px";
          el.style.width = width + "px";
          el.style.top = top + "px";

          const labelEl = document.createElement("div");
          labelEl.className = "event-label";
          labelEl.textContent = TYPE_META[ev.type].icon + " " + ev.title;

          const timeEl = document.createElement("div");
          timeEl.className = "event-time";
          timeEl.textContent = formatTime(ev.start) + "–" + formatTime(ev.end);

          const body = document.createElement("div");
          body.className = "event-body";

          const arrow = document.createElement("div");
          arrow.className = "event-arrow";

          const leftHandle = document.createElement("div");
          leftHandle.className = "handle left";
          leftHandle.dataset.action = "resize-left";

          const rightHandle = document.createElement("div");
          rightHandle.className = "handle right";
          rightHandle.dataset.action = "resize-right";

          el.appendChild(labelEl);
          el.appendChild(timeEl);
          el.appendChild(body);
          el.appendChild(arrow);
          el.appendChild(leftHandle);
          el.appendChild(rightHandle);

          el.addEventListener("pointerdown", onPointerDownEvent);
          el.addEventListener("click", (e) => {
            e.stopPropagation();
            selectedId = ev.id;
            renderSidebar();
            renderBoard();
          });

          grid.appendChild(el);
        }

        grid.addEventListener("click", () => {
          selectedId = null;
          renderSidebar();
          renderBoard();
        });

        row.appendChild(grid);
        board.appendChild(row);
      }
    }

    function renderSidebar(){
      const ev = getEventById(selectedId);

      if(!ev){
        sidebar.innerHTML = `
          <div class="hint">Выбери событие на диаграмме.</div>
          <div class="footer-note">
            Можно перетаскивать событие по времени, между днями и по дорожкам внутри дня.
            Растягивание делается за чёрные ручки слева и справа.
          </div>
        `;
        return;
      }

      sidebar.innerHTML = `
        <div class="summary-card ${ev.type}">
          <div class="summary-title">${TYPE_META[ev.type].icon} ${TYPE_META[ev.type].label}</div>
          <div>${DAYS[ev.day]} · ${formatTime(ev.start)}–${formatTime(ev.end)}</div>
        </div>

        <div class="field">
          <label>Тип</label>
          <select id="fieldType">
            <option value="pickup" ${ev.type==="pickup"?"selected":""}>Самовывоз</option>
            <option value="delivery" ${ev.type==="delivery"?"selected":""}>Доставка</option>
            <option value="transfer" ${ev.type==="transfer"?"selected":""}>Перемещение</option>
          </select>
        </div>

        <div class="field">
          <label>Название</label>
          <input id="fieldTitle" type="text" value="${escapeHtml(ev.title)}">
        </div>

        <div class="field">
          <label>Пояснение</label>
          <textarea id="fieldNote">${escapeHtml(ev.note)}</textarea>
        </div>

        <div class="field">
          <label>День недели</label>
          <select id="fieldDay">
            ${DAYS.map((d,i)=>`<option value="${i}" ${i===ev.day?"selected":""}>${d}</option>`).join("")}
          </select>
        </div>

        <div class="grid-2">
          <div class="field">
            <label>Начало</label>
            <input id="fieldStart" type="time" step="900" value="${formatTime(ev.start)}">
          </div>
          <div class="field">
            <label>Окончание</label>
            <input id="fieldEnd" type="time" step="900" value="${formatTime(ev.end)}">
          </div>
        </div>

        <div class="field">
          <label>Дорожка внутри дня</label>
          <input id="fieldLane" type="number" min="0" step="1" value="${ev.lane}">
        </div>

        <button class="btn danger" id="deleteBtn" style="width:100%;">Удалить событие</button>

        <div class="footer-note">
          Внесены условия по самовывозу, доставке и перемещениям Ступино → СПБ, Шереметьево, Подольск.
          Для перемещений оставлена пометка про XL-формат.
        </div>
      `;

      document.getElementById("fieldType").addEventListener("change", e => {
        ev.type = e.target.value;
        render();
      });

      document.getElementById("fieldTitle").addEventListener("input", e => {
        ev.title = e.target.value;
        renderBoard();
      });

      document.getElementById("fieldNote").addEventListener("input", e => {
        ev.note = e.target.value;
      });

      document.getElementById("fieldDay").addEventListener("change", e => {
        ev.day = Number(e.target.value);
        normalizeLanes();
        render();
      });

      document.getElementById("fieldStart").addEventListener("change", e => {
        const val = clamp(snapMinutes(parseTimeInput(e.target.value)), START_HOUR * 60, ev.end - MIN_DURATION);
        ev.start = val;
        normalizeLanes();
        render();
      });

      document.getElementById("fieldEnd").addEventListener("change", e => {
        const val = clamp(snapMinutes(parseTimeInput(e.target.value)), ev.start + MIN_DURATION, END_HOUR * 60);
        ev.end = val;
        normalizeLanes();
        render();
      });

      document.getElementById("fieldLane").addEventListener("input", e => {
        ev.lane = Math.max(0, Number(e.target.value || 0));
        renderBoard();
      });

      document.getElementById("deleteBtn").addEventListener("click", () => {
        events = events.filter(x => x.id !== ev.id);
        selectedId = events[0]?.id ?? null;
        normalizeLanes();
        render();
      });
    }

    function onPointerDownEvent(e){
      const eventEl = e.currentTarget;
      const id = Number(eventEl.dataset.id);
      const ev = getEventById(id);
      if(!ev) return;

      e.preventDefault();
      e.stopPropagation();

      selectedId = id;

      const action = e.target.dataset.action || "move";
      const boardRect = board.getBoundingClientRect();

      dragState = {
        id,
        action,
        startClientX: e.clientX,
        startClientY: e.clientY,
        originalStart: ev.start,
        originalEnd: ev.end,
        originalDay: ev.day,
        originalLane: ev.lane,
        boardRect
      };

      document.body.classList.add("dragging");
      window.addEventListener("pointermove", onPointerMove);
      window.addEventListener("pointerup", onPointerUp);
      render();
    }

    function onPointerMove(e){
      if(!dragState) return;
      const ev = getEventById(dragState.id);
      if(!ev) return;

      const dx = e.clientX - dragState.startClientX;
      const boardX = e.clientX - dragState.boardRect.left - DAY_WIDTH;
      const boardY = e.clientY - dragState.boardRect.top;

      if(dragState.action === "move"){
        const duration = dragState.originalEnd - dragState.originalStart;

        let nextStart = snapMinutes(dragState.originalStart + (dx / HOUR_WIDTH) * 60);
        nextStart = clamp(nextStart, START_HOUR * 60, END_HOUR * 60 - duration);

        const nextDay = clamp(getDayFromBoardY(boardY), 0, DAYS.length - 1);
        const nextLane = Math.max(0, getLaneFromBoardY(boardY, nextDay));

        ev.start = nextStart;
        ev.end = nextStart + duration;
        ev.day = nextDay;
        ev.lane = nextLane;
      }

      if(dragState.action === "resize-left"){
        let nextStart = snapMinutes(xToMinutes(boardX));
        nextStart = clamp(nextStart, START_HOUR * 60, ev.end - MIN_DURATION);
        ev.start = nextStart;
      }

      if(dragState.action === "resize-right"){
        let nextEnd = snapMinutes(xToMinutes(boardX));
        nextEnd = clamp(nextEnd, ev.start + MIN_DURATION, END_HOUR * 60);
        ev.end = nextEnd;
      }

      renderBoard();
      renderSidebar();
    }

    function onPointerUp(){
      if(!dragState) return;
      dragState = null;
      document.body.classList.remove("dragging");
      window.removeEventListener("pointermove", onPointerMove);
      window.removeEventListener("pointerup", onPointerUp);
      normalizeLanes();
      render();
    }

    function getDayFromBoardY(y){
      let cursor = HEADER_H;
      for(let d = 0; d < DAYS.length; d++){
        const h = getLaneCount(d) * LANE_STEP;
        if(y >= cursor && y < cursor + h) return d;
        cursor += h;
      }
      return DAYS.length - 1;
    }

    function getLaneFromBoardY(y, day){
      const top = getDayTop(day);
      return Math.floor(Math.max(0, y - top) / LANE_STEP);
    }

    normalizeLanes();
    render();
  </script>
</body>
</html>
